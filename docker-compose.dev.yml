services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: frostflow-dev-backend
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ZAPIER_WEBHOOK_URL: ${ZAPIER_WEBHOOK_URL:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/frostflow.db}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:8081}
      PORT: 8000
    volumes:
      - frostflow-dev-data:/app/data
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - frostflow-dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frostflow-dev-frontend
    depends_on:
      - backend
    expose:
      - "80"
    ports:
      - "8081:80"
    restart: unless-stopped
    networks:
      - frostflow-dev
      - proxy

volumes:
  frostflow-dev-data:

networks:
  frostflow-dev:
  proxy:
    external: true
