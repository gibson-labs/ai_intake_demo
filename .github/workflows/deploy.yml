name: Deploy AI Intake Form Demo

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: [self-hosted, hostinger]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build & deploy
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          OPENAI_BASE_URL: https://openrouter.ai/api/v1
          OPENAI_MODEL: openai/gpt-4o-mini
          OPENROUTER_SITE_URL: https://ai-intake.johnmgibson.com
          OPENROUTER_APP_NAME: AI Intake Form Demo
        run: |
          cd "${{ github.workspace }}"
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "OPENROUTER_API_KEY is missing from GitHub Actions secrets."
            exit 1
          fi
          if [ -z "$ZAPIER_WEBHOOK_URL" ]; then
            echo "ZAPIER_WEBHOOK_URL is missing from GitHub Actions secrets."
            exit 1
          fi
          if [ "${{ github.ref_name }}" = "main" ]; then
            COMPOSE_FILE="docker-compose.yml"
            PROJECT_NAME="frostflow"
          else
            COMPOSE_FILE="docker-compose.dev.yml"
            PROJECT_NAME="frostflow-dev"
          fi
          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" down --remove-orphans
          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" build --no-cache
          docker compose -p "$PROJECT_NAME" -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans
